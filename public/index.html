<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>实时听写</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage" aria-label="实时语音转文字">
        <div class="topbar">
          <div>
            <p class="eyebrow">实时听写</p>
            <h1>说话，文字实时出现。</h1>
          </div>
          <div class="status" id="status">未连接</div>
        </div>
        <p class="hint" id="hint">等待开始。</p>

        <div class="visualizer" id="visualizer" aria-hidden="true"></div>

        <div class="transcript" id="transcript" aria-live="polite">
          <span class="placeholder">点击开始，然后直接说话。</span>
        </div>

        <div class="controls">
          <button class="primary" id="toggleButton" type="button">开始</button>
          <button class="ghost" id="clearButton" type="button">清空</button>
          <button class="ghost compact" id="resetTotalButton" type="button">重置累计</button>
        </div>

        <div class="meter" aria-label="费用估算">
          <span><small>模型</small><b id="modelName">fun-asr-realtime</b></span>
          <span><small>单价</small><b id="unitPrice">0.00033 元/秒</b></span>
          <span><small>本次时长</small><b id="elapsedTime">00:00</b></span>
          <strong><small>本次费用</small><b id="estimatedCost">约 0.0000 元</b></strong>
          <strong><small>已累计</small><b id="totalCost">约 0.0000 元</b></strong>
        </div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
